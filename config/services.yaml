services:
  - id: folio-ai
    name: folio-ai
    repo: creativecloudnative/folio-ai
    runtime: nodejs
    deployment:
      platform: vercel
      url: https://creativecloudnative.com
    checks:
      health:
        enabled: true
        schedule: "0 */6 * * *"   # every 6 hours
        endpoints:
          - path: /
            expected_status: 200
      dependencies:
        enabled: true
        schedule: "0 9 * * 1"    # Mondays at 9am
        pr_strategy: grouped
        ignore:
          - "@types/*"
      security:
        enabled: true
        schedule: "0 9 * * *"    # daily at 9am
        severity_threshold: moderate
    pr:
      base_branch: main
      labels:
        - keeper-ai
        - automated
      draft: false
